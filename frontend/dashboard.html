<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>Dashboard - Project M</title>
	<link rel="stylesheet" href="common.css">
	<style>
		/* Page-specific styles */
		/* Add shortcut form */
		.add-section {
			background: var(--bg-secondary);
			padding: 20px;
			border-radius: 12px;
			margin-bottom: 30px;
			border: 1px solid var(--border-color);
		}

		.add-section h2 {
			color: var(--text-primary);
			font-size: 20px;
			margin-bottom: 15px;
		}

		.form-row {
			display: flex;
			gap: 10px;
			margin-bottom: 10px;
			flex-wrap: wrap;
		}

		.form-row input {
			flex: 1;
			min-width: 200px;
			padding: 10px;
			border: 1px solid var(--border-color);
			border-radius: 6px;
			background: var(--bg-primary);
			color: var(--text-primary);
			font-size: 14px;
		}


		/* Shortcuts grid */
		.shortcuts-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
			gap: 20px;
			margin-top: 20px;
		}

		.shortcut-item {
			background: var(--bg-secondary);
			padding: 20px;
			border-radius: 12px;
			text-align: center;
			cursor: pointer;
			transition: all 0.2s;
			border: 2px solid var(--border-color);
			position: relative;
		}

		.shortcut-item:hover {
			transform: translateY(-5px);
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
			border-color: var(--color-brand);
		}

		.shortcut-icon {
			width: 64px;
			height: 64px;
			border-radius: 12px;
			object-fit: cover;
			margin: 0 auto 10px;
			display: block;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		}

		.shortcut-name {
			color: var(--text-primary);
			font-size: 14px;
			word-break: break-word;
		}

		.shortcut-delete {
			position: absolute;
			top: 5px;
			right: 5px;
			background: #e74c3c;
			color: #fff;
			border: none;
			border-radius: 50%;
			width: 24px;
			height: 24px;
			cursor: pointer;
			font-size: 12px;
			display: none;
		}

		.shortcut-edit {
			position: absolute;
			top: 5px;
			right: 35px;
			background: #3498db;
			color: #fff;
			border: none;
			border-radius: 50%;
			width: 24px;
			height: 24px;
			cursor: pointer;
			font-size: 12px;
			display: none;
		}

		.shortcut-item:hover .shortcut-delete {
			display: block;
		}

		.shortcut-item:hover .shortcut-edit {
			display: block;
		}

		.shortcut-delete:hover {
			background: #c0392b;
		}

		.shortcut-edit:hover {
			background: #2980b9;
		}

		/* Edit modal */
		.modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.7);
			z-index: 1000;
			align-items: center;
			justify-content: center;
		}

		.modal.show {
			display: flex;
		}

		.modal-content {
			background: var(--bg-secondary);
			padding: 24px;
			border-radius: 12px;
			max-width: 500px;
			width: 90%;
			border: 1px solid var(--border-color);
		}

		.modal-content h3 {
			color: var(--text-primary);
			margin-bottom: 20px;
			font-size: 22px;
		}

		.modal-form {
			display: flex;
			flex-direction: column;
			gap: 15px;
		}

		.modal-form label {
			color: var(--text-primary);
			font-weight: 500;
			font-size: 14px;
			margin-bottom: 5px;
		}

		.modal-form input {
			padding: 10px;
			border: 1px solid var(--border-color);
			border-radius: 6px;
			background: var(--bg-primary);
			color: var(--text-primary);
			font-size: 14px;
		}

		.modal-buttons {
			display: flex;
			gap: 10px;
			margin-top: 10px;
		}

		.modal-buttons button {
			flex: 1;
		}


		.placeholder {
			background: var(--bg-secondary);
			padding: 40px;
			border-radius: 12px;
			text-align: center;
			color: var(--text-secondary);
			border: 2px dashed var(--border-color);
			margin-top: 40px;
		}

		/* Section divider */
		.section-divider {
			margin: 40px 0;
			border: 0;
			border-top: 2px solid var(--border-color);
			position: relative;
		}

		.section-divider::after {
			content: attr(data-label);
			position: absolute;
			top: -12px;
			left: 50%;
			transform: translateX(-50%);
			background: var(--bg-primary);
			padding: 0 15px;
			color: var(--text-secondary);
			font-size: 14px;
			font-weight: bold;
		}

		.section-title {
			color: var(--text-primary);
			font-size: 22px;
			margin-bottom: 15px;
			margin-top: 30px;
			display: flex;
			align-items: center;
			gap: 10px;
		}

		/* Tab switch */
		.tab-switch {
			display: flex;
			gap: 10px;
			margin-bottom: 15px;
		}

		.tab-btn {
			padding: 8px 16px;
			background: var(--bg-secondary);
			color: var(--text-primary);
			border: 2px solid var(--color-text-dark);
			border-radius: 8px;
			cursor: pointer;
			font-size: 14px;
			font-weight: 600;
			transition: all 0.2s;
		}

		.tab-btn:hover {
			background: var(--color-text-dark);
			color: var(--bg-primary);
		}

		.tab-btn.active {
			background: var(--color-brand);
			color: #fff;
			border-color: var(--color-brand);
		}
	</style>
</head>

<body>
	<!-- Sidebar được load từ sidebar.js -->

	<!-- Main Content -->
	<div class="main-content">
		<h1>� Quick Access</h1>

		<div class="add-section">
			<h2>➕ Thêm Shortcut Mới</h2>
			<div class="tab-switch">
				<button class="tab-btn active" id="tabWeb" onclick="switchTab('web')">🌐 Web</button>
				<button class="tab-btn" id="tabLocal" onclick="switchTab('local')">📁 Local</button>
			</div>
			<div class="form-row" id="formWeb">
				<input id="shortcutName" type="text" placeholder="Tên (ví dụ: YouTube)">
				<input id="shortcutUrl" type="text" placeholder="URL (ví dụ: https://youtube.com)">
				<input id="shortcutIcon" type="text" placeholder="Tên file icon (ví dụ: youtube.png)">
				<button class="btn btn-primary" onclick="addShortcut('web')">Insert</button>
			</div>
			<div class="form-row" id="formLocal" style="display: none;">
				<input id="localName" type="text" placeholder="Tên (ví dụ: Project C)">
				<input id="localPath" type="text" placeholder="Đường dẫn (ví dụ: D:\Project C)">
				<input id="localIcon" type="text" placeholder="Tên file icon (ví dụ: folder.png)">
				<button class="btn btn-primary" onclick="addShortcut('local')">Insert</button>
			</div>
		</div>

		<div class="section-title">🌐 Web Shortcuts</div>
		<div id="webShortcuts" class="shortcuts-grid"></div>

		<hr class="section-divider" data-label="LOCAL SHORTCUTS">

		<div class="section-title">📁 Local Shortcuts</div>
		<div id="localShortcuts" class="shortcuts-grid"></div>
	</div>

	<script src="sidebar.js"></script>
	<script>
		// Create sidebar when DOM loaded
		document.addEventListener('DOMContentLoaded', () => createSidebar('dashboard.html'));
		// API_BASE tự động detect từ hostname hiện tại
		const API_BASE = `http://${location.hostname}:3001`;

		let shortcuts = [];

		// Load shortcuts
		async function loadShortcuts() {
			try {
				const res = await fetch(`${API_BASE}/api/shortcuts`);
				shortcuts = await res.json();
				renderShortcuts();
			} catch (err) {
				console.error('Error loading shortcuts:', err);
			}
		}

		// Render shortcuts
		function renderShortcuts() {
			const webContainer = document.getElementById('webShortcuts');
			const localContainer = document.getElementById('localShortcuts');

			const webShortcuts = shortcuts.filter(s => s.type === 'web' || !s.type);
			const localShortcuts = shortcuts.filter(s => s.type === 'local');

			// Render web shortcuts
			if (webShortcuts.length === 0) {
				webContainer.innerHTML = '<div class="placeholder"><p>Chưa có web shortcut nào.</p></div>';
			} else {
				webContainer.innerHTML = webShortcuts.map((s) => {
					const index = shortcuts.indexOf(s);
					return `
			<div class="shortcut-item" onclick="openShortcut(${index}, 'web')">
				<button class="shortcut-edit" onclick="event.stopPropagation(); editShortcut(${index})">✎</button>
				<button class="shortcut-delete" onclick="event.stopPropagation(); deleteShortcut(${index})">×</button>
				<img class="shortcut-icon" src="${API_BASE}/picture/${encodeURIComponent(s.icon)}" onerror="this.onerror=null; this.src='${API_BASE}/picture/default.png';" alt="${s.name}">
				<div class="shortcut-name">${s.name}</div>
			</div>
			`;
				}).join('');
			}

			// Render local shortcuts
			if (localShortcuts.length === 0) {
				localContainer.innerHTML = '<div class="placeholder"><p>Chưa có local shortcut nào.</p></div>';
			} else {
				localContainer.innerHTML = localShortcuts.map((s) => {
					const index = shortcuts.indexOf(s);
					return `
			<div class="shortcut-item" onclick="openShortcut(${index}, 'local')">
				<button class="shortcut-edit" onclick="event.stopPropagation(); editShortcut(${index})">✎</button>
				<button class="shortcut-delete" onclick="event.stopPropagation(); deleteShortcut(${index})">×</button>
				<img class="shortcut-icon" src="${API_BASE}/picture/${encodeURIComponent(s.icon)}" onerror="this.onerror=null; this.src='${API_BASE}/picture/default.png';" alt="${s.name}">
				<div class="shortcut-name">${s.name}</div>
			</div>
			`;
				}).join('');
			}
		}

		// Switch tab
		function switchTab(tab) {
			const tabWeb = document.getElementById('tabWeb');
			const tabLocal = document.getElementById('tabLocal');
			const formWeb = document.getElementById('formWeb');
			const formLocal = document.getElementById('formLocal');

			if (tab === 'web') {
				tabWeb.classList.add('active');
				tabLocal.classList.remove('active');
				formWeb.style.display = 'flex';
				formLocal.style.display = 'none';
			} else {
				tabWeb.classList.remove('active');
				tabLocal.classList.add('active');
				formWeb.style.display = 'none';
				formLocal.style.display = 'flex';
			}
		}

		// Add shortcut
		async function addShortcut(type) {
			let name, url, icon;

			if (type === 'web') {
				name = document.getElementById('shortcutName').value.trim();
				url = document.getElementById('shortcutUrl').value.trim();
				icon = document.getElementById('shortcutIcon').value.trim();

				if (!name || !url) {
					alert('Vui lòng nhập tên và URL!');
					return;
				}

				// Xử lý URL: tự động thêm https:// nếu chưa có protocol
				if (!url.startsWith('http://') && !url.startsWith('https://')) {
					url = 'https://' + url;
				}
			} else {
				name = document.getElementById('localName').value.trim();
				url = document.getElementById('localPath').value.trim();
				icon = document.getElementById('localIcon').value.trim();

				if (!name || !url) {
					alert('Vui lòng nhập tên và đường dẫn!');
					return;
				}

				// Xử lý path có dấu ngoặc kép (từ Ctrl+Shift+C trên Windows)
				if (url.startsWith('"') && url.endsWith('"')) {
					url = url.slice(1, -1);
				}
			}

			// Xử lý path có dấu ngoặc kép (từ Ctrl+Shift+C trên Windows)
			if (icon.startsWith('"') && icon.endsWith('"')) {
				icon = icon.slice(1, -1);
			}

			// Lấy tên file từ path đầy đủ
			if (icon.includes('\\') || icon.includes('/')) {
				icon = icon.split(/[\\\/]/).pop();
			}

			if (!icon) icon = 'default.png';

			// Tự động gán index là số lớn nhất + 1
			const maxIndex = shortcuts.length > 0 ? Math.max(...shortcuts.map(s => s.index || 0)) : -1;
			const newIndex = maxIndex + 1;

			shortcuts.push({ name, url, icon, type, index: newIndex });

			try {
				await fetch(`${API_BASE}/api/shortcuts`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(shortcuts)
				});

				// Clear inputs
				if (type === 'web') {
					document.getElementById('shortcutName').value = '';
					document.getElementById('shortcutUrl').value = '';
					document.getElementById('shortcutIcon').value = '';
				} else {
					document.getElementById('localName').value = '';
					document.getElementById('localPath').value = '';
					document.getElementById('localIcon').value = '';
				}

				renderShortcuts();
			} catch (err) {
				console.error('Error adding shortcut:', err);
				alert('Lỗi khi thêm shortcut!');
			}
		}

		// Delete shortcut
		async function deleteShortcut(index) {
			if (!confirm('Xóa shortcut này?')) return;

			shortcuts.splice(index, 1);

			try {
				await fetch(`${API_BASE}/api/shortcuts`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(shortcuts)
				});

				renderShortcuts();
			} catch (err) {
				console.error('Error deleting shortcut:', err);
				alert('Lỗi khi xóa shortcut!');
			}
		}

		// Open shortcut
		async function openShortcut(index, type) {
			const shortcut = shortcuts[index];

			if (type === 'local' || shortcut.type === 'local') {
				// Call API to open local file/folder
				try {
					const res = await fetch(`${API_BASE}/api/open-local`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ path: shortcut.url })
					});

					const data = await res.json();
					if (!data.success) {
						alert('Lỗi: ' + (data.error || 'Không thể mở file/folder'));
					}
				} catch (err) {
					alert('Lỗi kết nối: ' + err.message);
				}
			} else {
				// Open web URL in new tab
				window.open(shortcut.url, '_blank');
			}
		}

		// Edit shortcut
		let editingIndex = -1;

		function editShortcut(index) {
			editingIndex = index;
			const shortcut = shortcuts[index];

			document.getElementById('editType').value = shortcut.type || 'web';
			document.getElementById('editName').value = shortcut.name;
			document.getElementById('editUrl').value = shortcut.url;
			document.getElementById('editIcon').value = shortcut.icon;

			updateEditUrlLabel(shortcut.type || 'web');

			document.getElementById('editModal').classList.add('show');
		}

		function updateEditUrlLabel(type) {
			const label = document.getElementById('editUrlLabel');
			if (type === 'local') {
				label.textContent = 'Đường dẫn:';
				document.getElementById('editUrl').placeholder = 'Ví dụ: D:\\Project C';
			} else {
				label.textContent = 'URL:';
				document.getElementById('editUrl').placeholder = 'Ví dụ: youtube.com';
			}
		}

		function closeEditModal() {
			document.getElementById('editModal').classList.remove('show');
			editingIndex = -1;
		}

		async function saveEdit() {
			if (editingIndex === -1) return;

			const type = document.getElementById('editType').value;
			const name = document.getElementById('editName').value.trim();
			let url = document.getElementById('editUrl').value.trim();
			let icon = document.getElementById('editIcon').value.trim();

			if (!name || !url) {
				alert('Vui lòng nhập đầy đủ tên và URL/Đường dẫn!');
				return;
			}

			if (type === 'web') {
				// Xử lý URL: tự động thêm https:// nếu chưa có protocol
				if (!url.startsWith('http://') && !url.startsWith('https://')) {
					url = 'https://' + url;
				}
			} else {
				// Xử lý path có dấu ngoặc kép
				if (url.startsWith('"') && url.endsWith('"')) {
					url = url.slice(1, -1);
				}
			}

			// Xử lý path có dấu ngoặc kép (từ Ctrl+Shift+C trên Windows)
			if (icon.startsWith('"') && icon.endsWith('"')) {
				icon = icon.slice(1, -1);
			}

			// Lấy tên file từ path đầy đủ
			if (icon.includes('\\') || icon.includes('/')) {
				icon = icon.split(/[\\\\|\/]/).pop();
			}

			if (!icon) icon = 'default.png';

			// Update shortcut
			shortcuts[editingIndex] = { name, url, icon, type, index: shortcuts[editingIndex].index };

			try {
				await fetch(`${API_BASE}/api/shortcuts`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(shortcuts)
				});

				closeEditModal();
				renderShortcuts();
			} catch (err) {
				console.error('Error updating shortcut:', err);
				alert('Lỗi khi cập nhật shortcut!');
			}
		}

		// Load shortcuts on page load
		loadShortcuts();

		// Setup event listeners
		document.addEventListener('DOMContentLoaded', function () {
			const editType = document.getElementById('editType');
			if (editType) {
				editType.addEventListener('change', function () {
					updateEditUrlLabel(this.value);
				});
			}
		});
	</script>

	<!-- Edit Modal -->
	<div id="editModal" class="modal" onclick="if(event.target === this) closeEditModal()">
		<div class="modal-content">
			<h3>✎ Chỉnh sửa Shortcut</h3>
			<div class="modal-form">
				<div>
					<label for="editType">Loại:</label>
					<select id="editType"
						style="padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); font-size: 14px;">
						<option value="web">🌐 Web</option>
						<option value="local">📁 Local</option>
					</select>
				</div>
				<div>
					<label for="editName">Tên:</label>
					<input id="editName" type="text" placeholder="Ví dụ: YouTube">
				</div>
				<div>
					<label for="editUrl" id="editUrlLabel">URL:</label>
					<input id="editUrl" type="text" placeholder="Ví dụ: youtube.com">
				</div>
				<div>
					<label for="editIcon">Icon (tên file trong thư mục picture):</label>
					<input id="editIcon" type="text" placeholder="Ví dụ: youtube.png">
				</div>
				<div class="modal-buttons">
					<button class="btn btn-primary" onclick="saveEdit()">💾 Lưu</button>
					<button class="btn btn-ghost" onclick="closeEditModal()">✖ Hủy</button>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
