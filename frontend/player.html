<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>?</title>
	<link rel="stylesheet" href="common.css">
	<style>
		body {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			transition: background 0.3s;
		}

		/* Sidebar overlay - page specific */
		.sidebar {
			transform: translateX(-100%);
			box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
		}

		.sidebar.show {
			transform: translateX(0);
		}

		.sidebar-toggle {
			position: fixed;
			top: 15px;
			left: 15px;
			background: rgba(0, 122, 204, 0.9);
			color: #fff;
			border: none;
			padding: 10px 14px;
			border-radius: 6px;
			cursor: pointer;
			z-index: 999;
			font-size: 18px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
		}

		.sidebar-toggle:hover {
			background: rgba(0, 90, 158, 0.9);
		}

		.sidebar-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.5);
			z-index: 998;
			display: none;
		}

		.sidebar-overlay.show {
			display: block;
		}

		.container {
			background: #fff;
			border-radius: 20px;
			padding: 40px;
			width: 90%;
			max-width: 600px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
		}

		.back-btn {
			background: #6c757d;
			color: #fff;
			border: none;
			padding: 10px 18px;
			border-radius: 6px;
			cursor: pointer;
			margin-bottom: 20px;
			font-size: 16px;
		}

		.back-btn:hover {
			background: #5a6268;
		}

		.song-info {
			text-align: center;
			margin-bottom: 30px;
		}

		.song-title {
			font-size: 24px;
			font-weight: bold;
			color: #333;
			margin-bottom: 10px;
			word-break: break-word;
		}

		.song-date {
			color: #666;
			font-size: 15px;
		}

		.player {
			background: #f8f9fa;
			padding: 20px;
			border-radius: 10px;
			margin-bottom: 20px;
		}

		.progress-container {
			margin-bottom: 15px;
		}

		.progress-bar {
			width: 100%;
			height: 10px;
			background: #ddd;
			border-radius: 5px;
			cursor: pointer;
			position: relative;
		}

		.progress {
			height: 100%;
			background: #667eea;
			border-radius: 5px;
			width: 0%;
		}

		.time-info {
			display: flex;
			justify-content: space-between;
			font-size: 14px;
			color: #666;
			margin-top: 8px;
		}

		.controls {
			display: flex;
			justify-content: center;
			gap: 20px;
			align-items: center;
		}

		.control-btn {
			background: #667eea;
			color: #fff;
			border: none;
			padding: 14px;
			border-radius: 50%;
			cursor: pointer;
			width: 55px;
			height: 55px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
		}

		.control-btn:hover {
			background: #5568d3;
		}

		.control-btn.play {
			width: 65px;
			height: 65px;
			font-size: 26px;
		}


		.play .ui-icon {
			width: 32px;
			height: 32px;
		}

		.notes-section {
			margin-top: 20px;
		}

		.notes-section h3 {
			margin-bottom: 12px;
			color: #333;
			font-size: 18px;
		}

		.notes-textarea {
			width: 100%;
			min-height: 120px;
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 6px;
			resize: vertical;
			font-family: Arial, sans-serif;
			font-size: 16px;
		}

		.save-btn {
			background: #28a745;
			color: #fff;
			border: none;
			padding: 12px 24px;
			border-radius: 6px;
			cursor: pointer;
			margin-top: 12px;
			width: 100%;
			font-size: 16px;
		}

		.save-btn:hover {
			background: #218838;
		}

		.save-status {
			text-align: center;
			margin-top: 12px;
			color: #28a745;
			font-size: 15px;
		}
	</style>
</head>

<body>
	<!-- Sidebar Overlay -->
	<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

	<!-- Sidebar được load từ sidebar.js -->

	<div class="container">
		<button class="back-btn" onclick="goBack()">← Back</button>


		<div class="song-info">
			<img id="coverImg" src="" alt="cover"
				style="max-width:220px;max-height:220px;border-radius:12px;box-shadow:0 2px 12px #aaa;margin-bottom:16px;object-fit:cover;">
			<div class="song-title" id="songTitle">Loading...</div>
			<div class="song-date" id="songDate"></div>
		</div>

		<div class="player">
			<audio id="audio" style="display: none;"></audio>
			<div class="progress-container">
				<div class="progress-bar" onclick="seek(event)">
					<div class="progress" id="progress"></div>
				</div>
				<div class="time-info">
					<span id="currentTime">0:00</span>
					<span id="duration">0:00</span>
				</div>
			</div>
			<div class="controls">
				<button class="control-btn" onclick="prevSong()"><img src="" class="ui-icon"
						id="back-icon-img"></button>
				<button class="control-btn play" id="playBtn" onclick="togglePlay()"><img src="" class="ui-icon"
						id="play-icon-img"></button>
				<button class="control-btn" onclick="nextSong()"><img src="" class="ui-icon"
						id="next-icon-img"></button>
			</div>
		</div>

		<div class="notes-section">
			<h3></h3>
			<textarea class="notes-textarea" id="notes" placeholder="Viết ghi chú về bài nhạc này..."></textarea>
			<div style="margin:10px 0 5px 0;">
				<label>Ảnh </label>
				<input id="coverInput" type="text" style="width:60%;padding:4px;" placeholder="vd: abc.jpg">
			</div>
			<button class="save-btn" onclick="saveNote()">Save</button>
			<div class="save-status" id="saveStatus"></div>
		</div>
	</div>

	<script src="sidebar.js"></script>
	<script>
		// Create sidebar when DOM loaded
		document.addEventListener('DOMContentLoaded', () => createSidebar('index.html'));
		// API_BASE tự động detect từ hostname hiện tại
		const API_BASE = `http://${location.hostname}:3001`;

		// Initialize Control Icons
		document.getElementById('back-icon-img').src = `${API_BASE}/api/thumbnail/back.png`;
		document.getElementById('play-icon-img').src = `${API_BASE}/api/thumbnail/play.png`;
		document.getElementById('next-icon-img').src = `${API_BASE}/api/thumbnail/next.png`;
		const params = new URLSearchParams(window.location.search);
		const songName = params.get('song');
		const audio = document.getElementById('audio');
		let allSongs = [];
		let currentIndex = 0;

		function goBack() {
			window.location.href = 'music.html';
		}

		function formatTime(seconds) {
			const mins = Math.floor(seconds / 60);
			const secs = Math.floor(seconds % 60);
			return `${mins}:${secs.toString().padStart(2, '0')}`;
		}

		function formatDate(isoString) {
			const d = new Date(isoString);
			return d.toLocaleString('vi-VN');
		}

		function togglePlay() {
			const btnImg = document.getElementById('play-icon-img');
			if (audio.paused) {
				audio.play();
				if (btnImg) btnImg.src = `${API_BASE}/api/thumbnail/pause.png`;
			} else {
				audio.pause();
				if (btnImg) btnImg.src = `${API_BASE}/api/thumbnail/play.png`;
			}
		}

		function seek(event) {
			const bar = event.currentTarget;
			const clickX = event.offsetX;
			const width = bar.offsetWidth;
			const percent = clickX / width;
			audio.currentTime = audio.duration * percent;
		}

		function prevSong() {
			currentIndex = (currentIndex - 1 + allSongs.length) % allSongs.length;
			loadSong(allSongs[currentIndex]);
		}

		function nextSong() {
			currentIndex = (currentIndex + 1) % allSongs.length;
			loadSong(allSongs[currentIndex]);
		}

		function loadSong(song, autoPlay = true) {
			document.getElementById('songTitle').textContent = song.name;
			document.getElementById('songDate').textContent = formatDate(song.datemodified);
			audio.src = `${API_BASE}${song.url}`;

			const btnImg = document.getElementById('play-icon-img');
			if (autoPlay) {
				audio.play();
				if (btnImg) btnImg.src = `${API_BASE}/api/thumbnail/pause.png`;
			} else {
				audio.pause();
				if (btnImg) btnImg.src = `${API_BASE}/api/thumbnail/play.png`;
			}

			// Update URL
			window.history.pushState({}, '', `?song=${encodeURIComponent(song.name)}`);
			// Load note & cover
			loadNote(song.name);
		}

		function loadNote(songName) {
			fetch(`${API_BASE}/api/notes/${encodeURIComponent(songName)}`)
				.then(res => res.json())
				.then(data => {
					document.getElementById('notes').value = data.note || '';
					document.getElementById('coverInput').value = data.cover || '';
					let cover = data.cover ? `${API_BASE}/picture/${encodeURIComponent(data.cover)}` : `${API_BASE}/picture/default.png`;
					// fallback nếu ảnh lỗi
					const img = document.getElementById('coverImg');
					img.src = cover;
					img.onerror = function () { this.src = `${API_BASE}/picture/default.png`; };
				})
				.catch(err => console.error('Error loading note:', err));
		}

		function saveNote() {
			const note = document.getElementById('notes').value;
			let cover = document.getElementById('coverInput').value.trim();

			// Xử lý path có dấu ngoặc kép (từ Ctrl+Shift+C trên Windows)
			if (cover.startsWith('"') && cover.endsWith('"')) {
				cover = cover.slice(1, -1);
			}

			// Lấy tên file từ path đầy đủ (D:\Project M\picture\abc.jpg -> abc.jpg)
			if (cover.includes('\\') || cover.includes('/')) {
				cover = cover.split(/[\\\/]/).pop();
			}

			fetch(`${API_BASE}/api/notes/${encodeURIComponent(songName)}`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ note, cover })
			})
				.then(res => res.json())
				.then(() => {
					const status = document.getElementById('saveStatus');
					status.textContent = '✓ Đã lưu thành công!';
					setTimeout(() => status.textContent = '', 2000);
					// Cập nhật hiển thị ảnh ngay lập tức
					if (cover) {
						const img = document.getElementById('coverImg');
						img.src = `${API_BASE}/picture/${encodeURIComponent(cover)}`;
						img.onerror = function () { this.src = `${API_BASE}/picture/default.png`; };
					}
				})
				.catch(err => console.error('Error saving note:', err));
		}

		// Audio events
		audio.addEventListener('timeupdate', () => {
			const progress = (audio.currentTime / audio.duration) * 100;
			document.getElementById('progress').style.width = `${progress}%`;
			document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
		});

		audio.addEventListener('loadedmetadata', () => {
			document.getElementById('duration').textContent = formatTime(audio.duration);
		});

		audio.addEventListener('ended', nextSong);

		// Load all songs and current song
		fetch(`${API_BASE}/api/songs`)
			.then(res => res.json())
			.then(songs => {
				allSongs = songs;
				currentIndex = songs.findIndex(s => s.name === songName);
				if (currentIndex === -1) currentIndex = 0;
				loadSong(allSongs[currentIndex], false);
			})
			.catch(err => console.error('Error loading songs:', err));

		// Override toggleSidebar để có overlay
		function toggleSidebar() {
			document.getElementById('sidebar').classList.toggle('show');
			document.getElementById('sidebarOverlay').classList.toggle('show');
		}
	</script>
</body>

</html>
