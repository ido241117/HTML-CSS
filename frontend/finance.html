<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Management - Personal Hub</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Page-specific overrides and additions */
        :root {
            --income-color: #4ec9b0;
            --expense-color: #f44747;
            --wallet-accent: #007acc;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .summary-card:hover {
            transform: translateY(-2px);
        }

        .summary-card h3 {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card .value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .summary-card .value.total {
            color: var(--wallet-accent);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .wallet-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--wallet-accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-card:hover {
            background: var(--sidebar-hover);
            border-color: var(--wallet-accent);
        }

        .wallet-card .name {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .wallet-card .balance {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 1.2rem;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: var(--hover-bg);
        }

        .btn-income {
            background: var(--income-color);
            color: #1e1e1e;
        }

        .btn-expense {
            background: var(--expense-color);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--sidebar-hover);
        }

        .transaction-list {
            background: var(--bg-secondary);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            transition: background 0.2s;
        }

        .transaction-item:hover {
            background: var(--sidebar-hover);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .t-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .t-cat {
            font-weight: 600;
            color: var(--text-primary);
        }

        .t-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .t-amount {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .t-expense {
            color: var(--expense-color);
        }

        /* Privacy Mode Styles */
        body.privacy-mode .privacy-masked {
            filter: blur(12px) grayscale(1);
            user-select: none;
            pointer-events: none;
            transition: filter 0.3s;
        }

        .privacy-masked {
            transition: filter 0.3s;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn-privacy {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn-privacy:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #007acc;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="header-container">
            <h1>Quản lý Tài chính</h1>
            <button id="privacy-toggle" class="btn-privacy" title="Ẩn/Hiện số dư">👁️</button>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <h3>Tổng số dư</h3>
                <div id="total-balance" class="value total privacy-masked">0 ₫</div>
            </div>
            <div class="summary-card">
                <h3>Thu nhập tháng này</h3>
                <div id="monthly-income" class="value t-income privacy-masked">0 ₫</div>
            </div>
            <div class="summary-card">
                <h3>Chi tiêu tháng này</h3>
                <div id="monthly-expense" class="value t-expense privacy-masked">0 ₫</div>
            </div>
        </div>

        <div class="section-header">
            <h2>Nguồn tiền</h2>
            <button class="btn-primary" onclick="openModal('walletModal')"><span>+</span> Thêm ví</button>
        </div>
        <div id="wallet-grid" class="wallet-grid">
            <!-- Wallets will be injected here -->
        </div>

        <div class="section-header">
            <h2>Giao dịch gần đây</h2>
            <div class="filter-controls" style="display: flex; gap: 10px; margin-bottom: 0;">
                <select id="filter-type" onchange="handleTypeFilterChange()" class="btn-secondary"
                    style="padding: 5px 10px; border-radius: 4px;">
                    <option value="all">Tất cả loại</option>
                    <option value="income">Tiền vào</option>
                    <option value="expense">Tiền ra</option>
                    <option value="transfer">Chuyển tiền</option>
                </select>
                <select id="filter-category" onchange="renderTransactions()" class="btn-secondary"
                    style="padding: 5px 10px; border-radius: 4px;">
                    <option value="all">Tất cả danh mục</option>
                </select>
            </div>
            <div class="actions">
                <button class="btn-secondary" onclick="openTransactionModal('income')"
                    style="color: var(--income-color); border-color: var(--income-color)">
                    <span>+</span> Nhận tiền
                </button>
                <button class="btn-secondary" onclick="openTransactionModal('expense')"
                    style="color: var(--expense-color); border-color: var(--expense-color)">
                    <span>-</span> Chi tiền
                </button>
                <button class="btn-secondary" onclick="openTransferModal()"
                    style="color: var(--wallet-accent); border-color: var(--wallet-accent)">
                    <span>⇅</span> Chuyển tiền
                </button>
            </div>
        </div>
        <div id="transaction-list" class="transaction-list">
            <!-- Transactions will be injected here -->
        </div>
    </div>

    <!-- Modal Wallet -->
    <div id="walletModal" class="modal">
        <div class="modal-content">
            <h2>Thêm nguồn tiền</h2>
            <form id="walletForm">
                <div class="form-group">
                    <label>Tên ví (vidu: Ví chính, ATM...)</label>
                    <input type="text" id="walletName" placeholder="Nhập tên ví..." required>
                </div>
                <div class="form-group">
                    <label>Số dư ban đầu</label>
                    <input type="number" id="walletBalance" value="0">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('walletModal')">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Transaction -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <h2 id="transModalTitle">Thêm giao dịch</h2>
            <form id="transForm">
                <input type="hidden" id="transEditId">
                <input type="hidden" id="transType">
                <div class="form-group">
                    <label>Nguồn tiền</label>
                    <select id="transWallet" required></select>
                </div>
                <div class="form-group">
                    <label>Số tiền</label>
                    <input type="number" id="transAmount" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="transCategory" required></select>
                </div>
                <div class="form-group">
                    <label>Ghi chú</label>
                    <input type="text" id="transNote" placeholder="Mô tả ngắn gọn...">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('transactionModal')">Hủy</button>
                    <button type="submit" id="transSubmitBtn" class="btn-primary">Lưu giao dịch</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Transfer -->
    <div id="transferModal" class="modal">
        <div class="modal-content">
            <h2>Chuyển tiền giữa các ví</h2>
            <form id="transferForm">
                <div class="form-group">
                    <label>Chuyển từ</label>
                    <select id="transferFrom" required></select>
                </div>
                <div class="form-group">
                    <label>Chuyển đến</label>
                    <select id="transferTo" required></select>
                </div>
                <div class="form-group">
                    <label>Số tiền</label>
                    <input type="number" id="transferAmount" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Ghi chú</label>
                    <input type="text" id="transferNote" placeholder="Lý do chuyển tiền (tùy chọn)...">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('transferModal')">Hủy</button>
                    <button type="submit" class="btn-primary">Thực hiện chuyển</button>
                </div>
            </form>
        </div>
    </div>

    <script src="sidebar.js"></script>
    <script src="finance.js"></script>
    <script>
        createSidebar('finance.html');
    </script>
</body>

</html>
