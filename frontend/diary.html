<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Diary - Project M</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* Page-specific styles */
    /* Main content override for diary */
    .main-content {
      margin-left: 240px;
      width: calc(100% - 240px);
      padding: 0;
      min-height: 100vh;
    }

    /* Profile header */
    .profile-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .cover-photo {
      width: 100%;
      height: 300px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
    }

    .cover-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-upload-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    .cover-upload-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .profile-info {
      padding: 20px 40px;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      position: relative;
      margin-top: -60px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid var(--bg-secondary);
      background: var(--bg-primary);
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      border-radius: 50%;
    }

    .avatar:hover .avatar-overlay {
      display: flex;
    }

    .profile-name {
      flex: 1;
      padding: 60px 0 10px 0;
    }

    .profile-name h1 {
      margin: 0 0 5px 0;
      font-size: 32px;
      color: var(--text-primary);
    }

    .profile-name p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* Content area */
    .content-area {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 20px;
    }

    /* Create post box */
    .create-post {
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .create-post textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 15px;
      font-family: Arial, sans-serif;
      resize: vertical;
      margin-bottom: 10px;
    }

    .create-post-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-input-label {
      padding: 8px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .file-input-label:hover {
      background: var(--border-color);
    }

    .file-input {
      display: none;
    }

    .category-input {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .btn-post {
      padding: 10px 24px;
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-left: auto;
    }

    .btn-post:hover {
      background: #005a9e;
    }

    .media-preview {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .media-preview-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
    }

    .media-preview-item img,
    .media-preview-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-preview-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Filter bar */
    .filter-bar {
      background: var(--bg-secondary);
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-bar input,
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }

    .filter-bar button {
      padding: 8px 16px;
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .filter-bar button:hover {
      background: #005a9e;
    }

    /* Post card */
    .post-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .post-header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .post-header .avatar {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border-color);
      margin: 0;
    }

    .post-header-info {
      flex: 1;
    }

    .post-header-info h3 {
      margin: 0;
      font-size: 16px;
      color: var(--text-primary);
    }

    .post-header-info p {
      margin: 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .post-category {
      display: inline-block;
      padding: 4px 10px;
      background: var(--bg-primary);
      border-radius: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .post-content {
      padding: 0 20px 15px 20px;
      color: var(--text-primary);
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .post-content.truncated {
      max-height: none;
    }

    .post-see-more {
      padding: 0 20px 10px 20px;
    }

    .post-see-more button {
      background: transparent;
      border: none;
      color: var(--color-brand);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 5px 0;
    }

    .post-see-more button:hover {
      text-decoration: underline;
    }

    .post-media {
      display: grid;
      gap: 5px;
      margin-bottom: 10px;
    }

    .post-media.single {
      grid-template-columns: 1fr;
    }

    .post-media.double {
      grid-template-columns: repeat(2, 1fr);
    }

    .post-media.multiple {
      grid-template-columns: repeat(3, 1fr);
    }

    .post-media-item {
      width: 100%;
      max-height: 400px;
      overflow: hidden;
      background: #000;
    }

    .post-media-item img,
    .post-media-item video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
    }

    .post-actions {
      padding: 10px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }

    .post-actions button {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 13px;
    }

    .post-actions button:hover {
      background: var(--bg-primary);
    }

    /* Loading indicator */
    .loading-indicator {
      text-align: center;
      padding: 30px;
      color: var(--text-secondary);
      font-size: 14px;
      display: none;
    }

    .loading-indicator.active {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid var(--border-color);
      border-top-color: var(--color-brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Sidebar được load từ sidebar.js -->

  <!-- Main Content -->
  <div class="main-content">
    <!-- Profile Header -->
    <div class="profile-header">
      <div class="cover-photo">
        <img id="coverImage" src="" alt="" style="display: none;">
        <button class="cover-upload-btn" onclick="document.getElementById('coverInput').click()">📷 Thay đổi ảnh
          bìa</button>
        <input type="file" id="coverInput" style="display: none;" accept="image/*" onchange="uploadCover(event)">
      </div>
      <div class="profile-info">
        <div class="avatar" onclick="document.getElementById('avatarInput').click()">
          <img id="avatarImage"
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23007acc'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='0.35em' font-size='40' fill='white' font-family='Arial'%3E📔%3C/text%3E%3C/svg%3E"
            alt="Avatar">
          <div class="avatar-overlay">📷 Đổi ảnh</div>
          <input type="file" id="avatarInput" style="display: none;" accept="image/*" onchange="uploadAvatar(event)">
        </div>
        <div class="profile-name">
          <h1>My Diary</h1>
          <p id="postCount">0 bài viết</p>
        </div>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Create Post -->
      <div class="create-post">
        <textarea id="postContent" placeholder="Bạn đang nghĩ gì..."></textarea>
        <div id="mediaPreview" class="media-preview"></div>
        <div class="create-post-actions">
          <label class="file-input-label">
            <span>📷 Ảnh/Video</span>
            <input type="file" id="mediaInput" class="file-input" accept="image/*,video/*" multiple
              onchange="handleMediaSelect(event)">
          </label>
          <input type="text" id="categoryInput" class="category-input"
            placeholder="Phân loại (VD: Du lịch, Công việc...)">
          <button class="btn-post" onclick="createPost()">Đăng bài</button>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <input type="date" id="filterDateFrom" placeholder="Từ ngày">
        <input type="date" id="filterDateTo" placeholder="Đến ngày">
        <select id="filterCategory">
          <option value="">Tất cả phân loại</option>
        </select>
        <select id="sortOrder">
          <option value="desc">Mới nhất</option>
          <option value="asc">Cũ nhất</option>
        </select>
        <button onclick="applyFilters()">🔍 Lọc</button>
        <button onclick="clearFilters()">✖️ Xóa bộ lọc</button>
      </div>

      <!-- Posts Container -->
      <div id="postsContainer"></div>

      <!-- Loading Indicator -->
      <div id="loadingIndicator" class="loading-indicator">
        <div class="loading-spinner"></div>
        <div>Đang tải thêm bài viết...</div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    // Create sidebar when DOM loaded
    document.addEventListener('DOMContentLoaded', () => createSidebar('diary.html'));
    // API_BASE tự động detect từ hostname hiện tại
    const API_BASE = `http://${location.hostname}:3001`;

    // Pagination constants
    const POSTS_PER_PAGE = 10;
    const SCROLL_THRESHOLD = 300; // pixels from bottom to trigger load

    let posts = [];
    let selectedMedia = [];
    let allCategories = new Set();
    let diaryProfile = {
      avatar: null,
      cover: null
    };

    // Pagination state
    let displayedPostsCount = 0;
    let isLoading = false;
    let hasMorePosts = true;

    // Load profile (avatar & cover)
    async function loadProfile() {
      try {
        const res = await fetch(`${API_BASE}/api/diary-profile`);
        const data = await res.json();
        if (data.avatar) {
          document.getElementById('avatarImage').src = `/picture/${encodeURIComponent(data.avatar)}`;
          diaryProfile.avatar = data.avatar;
        }
        if (data.cover) {
          const coverImg = document.getElementById('coverImage');
          coverImg.src = `/picture/${encodeURIComponent(data.cover)}`;
          coverImg.style.display = 'block';
          diaryProfile.cover = data.cover;
        }
      } catch (err) {
        console.error('Error loading profile:', err);
      }
    }

    // Upload avatar
    async function uploadAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const formData = new FormData();
        formData.append('avatar', file);

        const res = await fetch(`${API_BASE}/api/diary-profile/avatar`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('avatarImage').src = `/picture/${encodeURIComponent(data.filename)}`;
          diaryProfile.avatar = data.filename;
        } else {
          alert('Lỗi: ' + (data.error || 'Không thể upload avatar'));
        }
      } catch (err) {
        console.error('Error uploading avatar:', err);
        alert('Lỗi kết nối: ' + err.message);
      }
    }

    // Upload cover
    async function uploadCover(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const formData = new FormData();
        formData.append('cover', file);

        const res = await fetch(`${API_BASE}/api/diary-profile/cover`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.success) {
          const coverImg = document.getElementById('coverImage');
          coverImg.src = `/picture/${encodeURIComponent(data.filename)}`;
          coverImg.style.display = 'block';
          diaryProfile.cover = data.filename;
        } else {
          alert('Lỗi: ' + (data.error || 'Không thể upload cover'));
        }
      } catch (err) {
        console.error('Error uploading cover:', err);
        alert('Lỗi kết nối: ' + err.message);
      }
    }

    // Load posts
    async function loadPosts() {
      try {
        const res = await fetch(`${API_BASE}/api/diary-posts`);
        posts = await res.json();
        updateCategories();
        renderPosts();
        updatePostCount();
      } catch (err) {
        console.error('Error loading posts:', err);
      }
    }

    // Update categories dropdown
    function updateCategories() {
      allCategories.clear();
      posts.forEach(post => {
        if (post.category) allCategories.add(post.category);
      });

      const select = document.getElementById('filterCategory');
      select.innerHTML = '<option value="">Tất cả phân loại</option>';
      allCategories.forEach(cat => {
        select.innerHTML += `<option value="${cat}">${cat}</option>`;
      });
    }

    // Get filtered and sorted posts
    function getFilteredPosts() {
      let filteredPosts = [...posts];

      // Apply filters
      const dateFrom = document.getElementById('filterDateFrom').value;
      const dateTo = document.getElementById('filterDateTo').value;
      const category = document.getElementById('filterCategory').value;
      const sortOrder = document.getElementById('sortOrder').value;

      if (dateFrom) {
        filteredPosts = filteredPosts.filter(p => new Date(p.createdAt) >= new Date(dateFrom));
      }
      if (dateTo) {
        filteredPosts = filteredPosts.filter(p => new Date(p.createdAt) <= new Date(dateTo + 'T23:59:59'));
      }
      if (category) {
        filteredPosts = filteredPosts.filter(p => p.category === category);
      }

      // Sort
      filteredPosts.sort((a, b) => {
        const dateA = new Date(a.createdAt);
        const dateB = new Date(b.createdAt);
        return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
      });

      return filteredPosts;
    }

    // Render posts (with lazy loading)
    function renderPosts(reset = true) {
      const container = document.getElementById('postsContainer');

      if (reset) {
        container.innerHTML = '';
        displayedPostsCount = 0;
        hasMorePosts = true;
      }

      const filteredPosts = getFilteredPosts();

      if (filteredPosts.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">Chưa có bài viết nào</div>';
        hasMorePosts = false;
        return;
      }

      // Render only new posts (from displayedPostsCount to displayedPostsCount + POSTS_PER_PAGE)
      const postsToRender = filteredPosts.slice(displayedPostsCount, displayedPostsCount + POSTS_PER_PAGE);

      postsToRender.forEach(post => {
        const postCard = createPostCard(post);
        container.appendChild(postCard);
      });

      displayedPostsCount += postsToRender.length;
      hasMorePosts = displayedPostsCount < filteredPosts.length;

      // Hide loading indicator
      document.getElementById('loadingIndicator').classList.remove('active');
      isLoading = false;
    }

    // Create post card element
    function createPostCard(post) {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.dataset.postId = post.id;

      const date = new Date(post.createdAt);
      const dateStr = date.toLocaleDateString('vi-VN', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      // Truncate content to 300 characters
      const maxLength = 300;
      const fullContent = post.content || '';
      const isTruncated = fullContent.length > maxLength;
      const displayContent = isTruncated ? fullContent.substring(0, maxLength) + '...' : fullContent;

      let mediaHTML = '';
      if (post.media && post.media.length > 0) {
        const mediaClass = post.media.length === 1 ? 'single' : post.media.length === 2 ? 'double' : 'multiple';
        mediaHTML = `<div class="post-media ${mediaClass}">`;
        post.media.forEach(m => {
          const isVideo = /\.(mp4|webm|ogg|mov)$/i.test(m);
          if (isVideo) {
            mediaHTML += `<div class="post-media-item"><video src="/picture/${encodeURIComponent(m)}" controls></video></div>`;
          } else {
            mediaHTML += `<div class="post-media-item"><img src="/picture/${encodeURIComponent(m)}" onclick="openMedia('/picture/${encodeURIComponent(m)}')"></div>`;
          }
        });
        mediaHTML += '</div>';
      }

      // See more button
      const seeMoreHTML = isTruncated ? `
        <div class="post-see-more">
          <button onclick="togglePostContent('${post.id}')">Xem thêm</button>
        </div>
      ` : '';

      card.innerHTML = `
        <div class="post-header">
          <div class="avatar">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23007acc'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='0.35em' font-size='40' fill='white' font-family='Arial'%3E📔%3C/text%3E%3C/svg%3E" alt="Avatar">
          </div>
          <div class="post-header-info">
            <h3>
              My Diary
              ${post.category ? `<span class="post-category">${post.category}</span>` : ''}
            </h3>
            <p>${dateStr}</p>
          </div>
        </div>
        <div class="post-content" data-full-content="${fullContent.replace(/"/g, '&quot;')}" data-short-content="${displayContent.replace(/"/g, '&quot;')}">${displayContent}</div>
        ${seeMoreHTML}
        ${mediaHTML}
        <div class="post-actions">
          <button onclick="editPost('${post.id}')">✏️ Sửa</button>
          <button onclick="deletePost('${post.id}')">🗑️ Xóa</button>
        </div>
      `;

      return card;
    }

    // Toggle post content (expand/collapse)
    function togglePostContent(postId) {
      const card = document.querySelector(`[data-post-id="${postId}"]`);
      if (!card) return;

      const contentDiv = card.querySelector('.post-content');
      const seeMoreDiv = card.querySelector('.post-see-more button');

      if (!contentDiv || !seeMoreDiv) return;

      const fullContent = contentDiv.dataset.fullContent;
      const shortContent = contentDiv.dataset.shortContent;

      if (seeMoreDiv.textContent === 'Xem thêm') {
        // Expand
        contentDiv.innerHTML = fullContent;
        seeMoreDiv.textContent = 'Thu gọn';
      } else {
        // Collapse
        contentDiv.innerHTML = shortContent;
        seeMoreDiv.textContent = 'Xem thêm';
      }
    }

    // Handle media selection
    function handleMediaSelect(event) {
      selectedMedia = Array.from(event.target.files);
      renderMediaPreview();
    }

    // Render media preview
    function renderMediaPreview() {
      const preview = document.getElementById('mediaPreview');
      preview.innerHTML = '';

      selectedMedia.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'media-preview-item';

        const isVideo = file.type.startsWith('video/');
        const url = URL.createObjectURL(file);

        if (isVideo) {
          item.innerHTML = `
            <video src="${url}"></video>
            <button class="media-preview-remove" onclick="removeMedia(${index})">×</button>
          `;
        } else {
          item.innerHTML = `
            <img src="${url}">
            <button class="media-preview-remove" onclick="removeMedia(${index})">×</button>
          `;
        }

        preview.appendChild(item);
      });
    }

    // Remove media from selection
    function removeMedia(index) {
      selectedMedia.splice(index, 1);
      renderMediaPreview();

      // Update file input
      const dataTransfer = new DataTransfer();
      selectedMedia.forEach(file => dataTransfer.items.add(file));
      document.getElementById('mediaInput').files = dataTransfer.files;
    }

    // Create post
    async function createPost() {
      const content = document.getElementById('postContent').value.trim();
      const category = document.getElementById('categoryInput').value.trim();

      if (!content) {
        alert('Vui lòng nhập nội dung!');
        return;
      }

      try {
        const formData = new FormData();
        formData.append('content', content);
        formData.append('category', category);

        selectedMedia.forEach(file => {
          formData.append('media', file);
        });

        const res = await fetch(`${API_BASE}/api/diary-posts`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('postContent').value = '';
          document.getElementById('categoryInput').value = '';
          document.getElementById('mediaInput').value = '';
          selectedMedia = [];
          renderMediaPreview();

          await loadPosts();
        } else {
          alert('Lỗi: ' + (data.error || 'Không thể tạo bài viết'));
        }
      } catch (err) {
        console.error('Error creating post:', err);
        alert('Lỗi kết nối: ' + err.message);
      }
    }

    // Delete post
    async function deletePost(id) {
      if (!confirm('Xóa bài viết này?')) return;

      try {
        const res = await fetch(`${API_BASE}/api/diary-posts/${id}`, {
          method: 'DELETE'
        });

        const data = await res.json();

        if (data.success) {
          await loadPosts();
        } else {
          alert('Lỗi: ' + (data.error || 'Không thể xóa bài viết'));
        }
      } catch (err) {
        console.error('Error deleting post:', err);
        alert('Lỗi kết nối: ' + err.message);
      }
    }

    // Open post text file in default editor
    async function editPost(id) {
      try {
        const res = await fetch(`${API_BASE}/api/open-diary-file/${id}`);
        const data = await res.json();

        if (data.success) {
          // Hiển thị thông báo ngắn
          const notification = document.createElement('div');
          notification.textContent = '✓ Đã mở file trong ứng dụng mặc định';
          notification.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #28a745; color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.3);';
          document.body.appendChild(notification);

          setTimeout(() => {
            notification.remove();
          }, 3000);
        } else {
          alert('Lỗi: ' + (data.error || 'Không thể mở file'));
        }
      } catch (err) {
        console.error('Error opening file:', err);
        alert('Lỗi kết nối: ' + err.message);
      }
    }

    // Apply filters
    function applyFilters() {
      renderPosts(true); // Reset pagination when filtering
    }

    // Clear filters
    function clearFilters() {
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';
      document.getElementById('filterCategory').value = '';
      document.getElementById('sortOrder').value = 'desc';
      renderPosts(true); // Reset pagination when clearing filters
    }

    // Update post count
    function updatePostCount() {
      document.getElementById('postCount').textContent = `${posts.length} bài viết`;
    }

    // Open media in new tab
    function openMedia(url) {
      window.open(url, '_blank');
    }

    // Load more posts when scrolling
    function loadMorePosts() {
      if (isLoading || !hasMorePosts) return;

      isLoading = true;
      document.getElementById('loadingIndicator').classList.add('active');

      // Simulate a small delay for better UX (optional)
      setTimeout(() => {
        renderPosts(false); // false = don't reset, append to existing posts
      }, 300);
    }

    // Scroll event listener for infinite scroll
    function handleScroll() {
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;

      // Check if user scrolled near bottom
      if (scrollTop + windowHeight >= documentHeight - SCROLL_THRESHOLD) {
        loadMorePosts();
      }
    }

    // Attach scroll listener
    window.addEventListener('scroll', handleScroll);

    // Load posts on page load
    loadPosts();
    loadProfile();
  </script>
</body>

</html>
