<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>Project M</title>
	<link rel="stylesheet" href="common.css">
	<style>
		/* Page-specific styles */
		.controls {
			margin-bottom: 20px;
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}

		.song-list {
			margin-top: 20px;
		}

		.song-item {
			background: var(--bg-secondary);
			margin-bottom: 15px;
			padding: 15px;
			border-radius: 8px;
			box-shadow: var(--shadow);
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			border: 1px solid var(--border-color);
			transition: all 0.3s ease;
		}

		.song-item:hover {
			border-color: var(--color-brand);
			background: #fdfdfd;
			transform: translateY(-2px);
			box-shadow: 0 6px 15px rgba(78, 70, 89, 0.12);
		}

		.cover-thumb {
			width: 60px;
			height: 60px;
			border-radius: 8px;
			object-fit: cover;
			margin-right: 16px;
			box-shadow: var(--shadow);
			background: var(--border-color);
			cursor: pointer;
			transition: transform 0.2s, filter 0.2s;
		}

		.cover-thumb:hover {
			transform: scale(1.05);
			filter: brightness(1.2);
		}

		.song-name {
			flex: 1;
			font-size: 16px;
			font-weight: 600;
			min-width: 200px;
			color: var(--color-text-dark);
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.song-item:hover .song-name {
			color: var(--color-brand);
		}

		.song-name:hover {
			text-decoration: none;
		}

		.song-date {
			width: 140px;
			color: var(--text-secondary);
			font-size: 14px;
		}

		audio {
			width: 100%;
			max-width: 300px;
			height: 40px;
		}

		/* Pagination */
		.pagination {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 8px;
			margin-top: 20px;
			flex-wrap: wrap;
		}

		.pagination button {
			padding: 8px 12px;
			background: var(--bg-secondary);
			color: var(--text-primary);
			border: 1px solid var(--border-color);
			border-radius: 4px;
			cursor: pointer;
			font-size: 14px;
			transition: all 0.2s;
		}

		.pagination button:hover:not(:disabled) {
			background: var(--color-brand);
			color: #fff;
			border-color: var(--color-brand);
		}

		.pagination button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.pagination button.active {
			background: var(--color-brand);
			color: #fff;
			border-color: var(--color-brand);
			font-weight: bold;
		}

		.pagination-info {
			color: var(--text-secondary);
			font-size: 14px;
			padding: 0 10px;
		}

		/* Search Section Redesign */
		.search-filter-section {
			background: var(--bg-secondary);
			padding: 24px;
			border-radius: 12px;
			margin-bottom: 25px;
			border: 1px solid var(--border-color);
			box-shadow: var(--shadow);
		}

		.search-form-row {
			display: flex;
			gap: 24px;
			align-items: flex-end;
			flex-wrap: wrap;
		}

		.filter-group {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.filter-group label {
			font-weight: 600;
			font-size: 14px;
			color: var(--text-primary);
		}

		.filter-input {
			padding: 10px 12px;
			border-radius: 8px;
			border: 1px solid var(--border-color);
			background: var(--bg-primary) !important; /* Nền background như yêu cầu */
			color: var(--text-primary);
			outline: none;
			transition: border-color 0.2s;
		}

		.filter-input:focus {
			border-color: var(--color-brand);
		}

		.date-range-container {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		/* Bottom Player Styles */
		body {
			padding-bottom: 100px;
		}

		/* Prevent footer overlap */

		.bottom-player {
			position: fixed;
			bottom: 0;
			left: 240px;
			width: calc(100% - 240px);
			height: 90px;
			background: var(--color-brand);
			color: var(--bg-primary);
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 20px;
			box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.3);
			z-index: 1000;
			border-top: 1px solid var(--color-brand);
		}

		.player-left {
			display: flex;
			align-items: center;
			width: 30%;
		}

		.player-thumb {
			width: 60px;
			height: 60px;
			border-radius: 6px;
			object-fit: cover;
			margin-right: 15px;
			background: var(--bg-secondary);
		}

		.player-info {
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.player-title {
			font-weight: bold;
			font-size: 16px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			color: var(--bg-primary);
		}

		.player-center {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			max-width: 600px;
		}

		.player-controls {
			display: flex;
			align-items: center;
			gap: 20px;
			margin-bottom: 5px;
		}

		.btn-control {
			background: none;
			border: none;
			color: var(--color-secondary);
			cursor: pointer;
			font-size: 20px;
			transition: all 0.2s;
		}

		.btn-control:hover {
			color: var(--color-accent);
			transform: scale(1.1);
		}

		.btn-control.active {
			color: var(--color-accent);
		}

		.btn-control.active .ui-icon {
			filter: invert(0.5) sepia(1) saturate(5) hue-rotate(175deg);
			opacity: 1;
		}

		/* Trang thái icon khi không active (Shuffle/Repeat off) */
		#btn-shuffle:not(.active) .ui-icon,
		#btn-repeat:not(.active) .ui-icon {
			opacity: 0.4;
		}

		.btn-control.play-pause {
			font-size: 32px;
			color: var(--color-accent);
			width: 45px;
			height: 45px;
			background: var(--color-accent);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
		}

		.btn-control.play-pause:hover {
			transform: scale(1.05);
			background: var(--hover-bg);
		}

		.progress-area {
			width: 100%;
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 12px;
			color: var(--color-secondary);
		}

		.seek-bar {
			flex: 1;
			cursor: pointer;
			height: 6px;
			-webkit-appearance: none;
			background: rgba(195, 187, 199, 0.3);
			border-radius: 3px;
			overflow: hidden;
			border: 1px solid rgba(195, 187, 199, 0.1);
		}

		.seek-bar::-webkit-slider-runnable-track {
			height: 6px;
			background: var(--color-brand);
			/* Track is brand color */
		}

		.seek-bar::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 12px;
			height: 12px;
			background: var(--color-accent);
			border-radius: 50%;
			margin-top: -3px;
			/* Center handle if needed */
			box-shadow: -400px 0 0 400px var(--color-accent);
			/* Fill effect */
		}

		.player-right {
			width: 30%;
			display: flex;
			justify-content: flex-end;
			align-items: center;
			gap: 10px;
		}

		.volume-slider {
			width: 100px;
			height: 4px;
			cursor: pointer;
			border-radius: 2px;
			background: var(--color-secondary);
			-webkit-appearance: none;
		}

		.volume-slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 10px;
			height: 10px;
			background: var(--color-accent);
			border-radius: 50%;
		}

		/* List Item adjustment */
		.item-play-btn {
			width: 40px;
			height: 40px;
			background: var(--color-brand);
			color: white;
			border: none;
			border-radius: 4px;
			/* Square with slight radius */
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 18px;
			margin-right: 15px;
			transition: background 0.2s;
		}

		.item-play-btn:hover {
			background: var(--hover-bg);
		}


		.play-pause .ui-icon {
			width: 32px;
			height: 32px;
		}

		.item-play-btn .ui-icon {
			width: 20px;
			height: 20px;
		}
	</style>
</head>

<body>
	<!-- Sidebar được load từ sidebar.js -->

	<!-- Main Content -->
	<div class="main-content">
		<h1>Music Manager</h1>
		<div class="controls">
			<button class="btn btn-secondary" onclick="sortSongs('name')">Sort theo tên</button>
			<button class="btn btn-secondary" onclick="sortSongs('date-asc')">Sort theo ngày (cũ → mới)</button>
			<button class="btn btn-secondary" onclick="sortSongs('date-desc')">Sort theo ngày (mới → cũ)</button>
			<button class="btn btn-secondary" onclick="openRawFolder()"
				style="width: 50px; height: 50px; padding: 0; font-size: 20px;" title="Mở thư mục RAW">📁</button>
			<button class="btn btn-secondary" onclick="rescanLibrary()"
				style="width: 50px; height: 50px; padding: 0; font-size: 20px;"
				title="Cập nhật danh sách (Rescan)">🔄</button>
		</div>

		<div class="search-filter-section">
			<div class="search-form-row">
				<div class="filter-group">
					<label for="searchName">Tìm theo tên:</label>
					<input id="searchName" type="text" class="filter-input" style="width: 250px;" 
						placeholder="Nhập tên bài nhạc..." oninput="filterSongs()">
				</div>
				
				<div class="filter-group">
					<label>Tìm theo khoảng ngày:</label>
					<div class="date-range-container">
						<input id="searchFrom" type="date" class="filter-input" onchange="filterSongs()">
						<span style="color: var(--text-secondary);">đến</span>
						<input id="searchTo" type="date" class="filter-input" onchange="filterSongs()">
						<button class="btn btn-ghost" onclick="filterSongs()" style="padding: 9px 20px;">Lọc</button>
					</div>
				</div>
			</div>
		</div>

		<div id="songs" class="song-list">Đang tải danh sách nhạc...</div>
		<div id="pagination" class="pagination" style="display: none;"></div>

		<!-- Fixed Bottom Player -->
		<div class="bottom-player" id="bottomPlayer" style="display:none;">
			<div class="player-left">
				<img id="bp-thumb" class="player-thumb" src=""
					onerror="this.onerror=null; this.src='${API_BASE}/picture/default.png';">
				<div class="player-info">
					<div id="bp-title" class="player-title">Chọn bài hát để nghe</div>
				</div>
			</div>

			<div class="player-center">
				<div class="player-controls">
					<button class="btn-control" id="btn-shuffle" onclick="toggleShuffle()" title="Ngẫu nhiên"><img
							src="" class="ui-icon" id="shuffle-icon-img"></button>
					<button class="btn-control" onclick="playPrev()" title="Bài trước"><img src="" class="ui-icon"
							id="back-icon-img"></button>
					<button class="btn-control play-pause" id="btn-play" onclick="togglePlay()"><img src=""
							class="ui-icon" id="play-icon-img"></button>
					<button class="btn-control" onclick="playNext()" title="Bài tiếp"><img src="" class="ui-icon"
							id="next-icon-img"></button>
					<button class="btn-control" id="btn-repeat" onclick="toggleRepeat()" title="Lặp lại"><img src=""
							class="ui-icon" id="repeat-icon-img"></button>
				</div>
				<div class="progress-area">
					<span id="bp-curr-time">0:00</span>
					<input type="range" id="bp-seek" class="seek-bar" value="0" min="0" step="1" oninput="seekAudio()">
					<span id="bp-total-time">0:00</span>
				</div>
			</div>

			<div class="player-right">
				<button class="btn-control" onclick="toggleMute()">🔊</button>
				<input type="range" id="bp-volume" class="volume-slider" min="0" max="1" step="0.1" value="1"
					oninput="setVolume()">
			</div>

			<audio id="global-audio" src="" preload="auto"></audio>
		</div>

		<script src="sidebar.js"></script>
		<script>
			// Create sidebar when DOM loaded
			document.addEventListener('DOMContentLoaded', () => createSidebar('music.html'));

			// API_BASE tự động detect từ hostname hiện tại
			const API_BASE = `http://${location.hostname}:3001`;

			// Initialize Control Icons
			document.getElementById('back-icon-img').src = `${API_BASE}/api/thumbnail/back.png`;
			document.getElementById('play-icon-img').src = `${API_BASE}/api/thumbnail/play.png`;
			document.getElementById('next-icon-img').src = `${API_BASE}/api/thumbnail/next.png`;
			document.getElementById('shuffle-icon-img').src = `${API_BASE}/api/thumbnail/shuffle.png`;
			document.getElementById('repeat-icon-img').src = `${API_BASE}/api/thumbnail/repeat.png`;

			let allSongs = [];
			let filteredSongs = [];

			// Player State
			let currentSongIndex = -1;
			let isPlaying = false;
			let repeatMode = 0; // 0: No Repeat, 1: Repeat All, 2: Repeat Once
			let isShuffle = false;
			let audio = document.getElementById('global-audio');

			// Pagination
			let currentPage = 1;
			let totalPages = 1;
			let isPaginationMode = false;

			// Lấy số trang từ URL
			function getPageFromURL() {
				const params = new URLSearchParams(window.location.search);
				const page = parseInt(params.get('page'));
				return (page && page > 0) ? page : 1;
			}

			// Cập nhật URL với số trang mới
			function updateURL(page) {
				const url = new URL(window.location);
				if (page > 1) {
					url.searchParams.set('page', page);
				} else {
					url.searchParams.delete('page');
				}
				window.history.replaceState({}, '', url);
			}

			function formatDate(isoString) {
				const d = new Date(isoString);
				return d.toLocaleString('vi-VN');
			}

			function renderSongs(songs) {
				const list = songs.map((song, index) => {
					const cover = song.cover ? `${API_BASE}/api/thumbnail/${encodeURIComponent(song.cover)}` : `${API_BASE}/picture/default.png`;
					return `
				<div class="song-item">
					<img class="cover-thumb" src="${cover}" onerror="this.onerror=null; this.src='${API_BASE}/picture/default.png';" 
						alt="cover" loading="lazy" onclick="playSelectedSong(${index})" title="Bấm vào ảnh để phát">
					<span class="song-name" onclick="openPlayer('${song.name.replace(/'/g, "\\'")}')">
						${song.name}
					</span>
					<span class="song-date">${formatDate(song.datemodified)}</span>
				</div>
				`;
				}).join('');
				document.getElementById('songs').innerHTML = list || 'Không có bài nhạc nào.';
			}

			function renderPagination(page, total) {
				const paginationDiv = document.getElementById('pagination');
				if (!isPaginationMode || total <= 1) {
					paginationDiv.style.display = 'none';
					return;
				}

				paginationDiv.style.display = 'flex';
				let html = '';

				// Previous button
				html += `<button onclick="loadPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>← Trước</button>`;

				// Page numbers
				const maxButtons = 5;
				let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
				let endPage = Math.min(total, startPage + maxButtons - 1);

				if (endPage - startPage < maxButtons - 1) {
					startPage = Math.max(1, endPage - maxButtons + 1);
				}

				if (startPage > 1) {
					html += `<button onclick="loadPage(1)">1</button>`;
					if (startPage > 2) html += `<span class="pagination-info">...</span>`;
				}

				for (let i = startPage; i <= endPage; i++) {
					html += `<button onclick="loadPage(${i})" class="${i === page ? 'active' : ''}">${i}</button>`;
				}

				if (endPage < total) {
					if (endPage < total - 1) html += `<span class="pagination-info">...</span>`;
					html += `<button onclick="loadPage(${total})">${total}</button>`;
				}

				// Next button
				html += `<button onclick="loadPage(${page + 1})" ${page === total ? 'disabled' : ''}>Tiếp →</button>`;

				// Info
				html += `<span class="pagination-info">Trang ${page}/${total}</span>`;

				paginationDiv.innerHTML = html;
			}

			async function loadPage(page) {
				if (page < 1 || page > totalPages) return;
				currentPage = page;
				updateURL(page);
				await loadSongs();
				window.scrollTo({ top: 0, behavior: 'smooth' });
			}

			async function loadSongs() {
				isPaginationMode = localStorage.getItem('paginationMode') === 'true';

				// Lấy trang từ URL nếu đang ở pagination mode
				if (isPaginationMode && currentPage === 1) {
					currentPage = getPageFromURL();
				}

				try {
					let url = `${API_BASE}/api/songs`;
					if (isPaginationMode) {
						url += `?page=${currentPage}&limit=20`;
					}

					const res = await fetch(url);
					const data = await res.json();

					if (isPaginationMode) {
						// Pagination mode
						allSongs = data.songs;
						totalPages = data.totalPages;
						await renderSongs(data.songs);
						renderPagination(currentPage, totalPages);
					} else {
						// Load all mode
						allSongs = data;
						filteredSongs = [];
						const sorted = [...data].sort((a, b) => new Date(b.datemodified) - new Date(a.datemodified));
						await renderSongs(sorted);
						document.getElementById('pagination').style.display = 'none';
					}
				} catch (err) {
					document.getElementById('songs').innerHTML = 'Không lấy được danh sách nhạc.';
				}
			}

			function filterSongs() {
				if (isPaginationMode) {
					alert('Vui lòng tắt chế độ phân trang để sử dụng tính năng tìm kiếm!');
					return;
				}

				let nameVal = document.getElementById('searchName').value.trim().toLowerCase();
				let fromVal = document.getElementById('searchFrom').value;
				let toVal = document.getElementById('searchTo').value;
				filteredSongs = allSongs.filter(song => {
					let ok = true;
					if (nameVal) ok = ok && song.name.toLowerCase().includes(nameVal);
					if (fromVal) ok = ok && (new Date(song.datemodified) >= new Date(fromVal));
					if (toVal) {
						let toDate = new Date(toVal);
						toDate.setHours(23, 59, 59, 999);
						ok = ok && (new Date(song.datemodified) <= toDate);
					}
					return ok;
				});
				renderSongs(filteredSongs);
			}

			function openPlayer(songName) {
				window.open(`player.html?song=${encodeURIComponent(songName)}`, '_blank');
			}

			function sortSongs(type) {
				if (isPaginationMode) {
					alert('Vui lòng tắt chế độ phân trang để sử dụng tính năng sắp xếp!');
					return;
				}

				let arr = filteredSongs.length ? [...filteredSongs] : [...allSongs];
				if (type === 'name') {
					arr.sort((a, b) => a.name.localeCompare(b.name));
				} else if (type === 'date-asc') {
					arr.sort((a, b) => new Date(a.datemodified) - new Date(b.datemodified));
				} else if (type === 'date-desc') {
					arr.sort((a, b) => new Date(b.datemodified) - new Date(a.datemodified));
				}
				renderSongs(arr);
			}

			async function openRawFolder() {
				try {
					const response = await fetch(`${API_BASE}/api/open-folder`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ path: 'D:\\Project M\\RAW' })
					});
					const result = await response.json();
					if (!result.success) {
						// alert('Không thể mở thư mục: ' + result.error);
					}
				} catch (error) {
					alert('Lỗi khi mở thư mục: ' + error.message);
				}
			}

			async function rescanLibrary() {
				if (!confirm('Bạn có muốn quét lại thư mục nhạc để cập nhật danh sách không?')) return;

				const btn = event.target; // Get button element
				const originalText = btn.textContent;
				btn.textContent = '⏳';
				btn.disabled = true;

				try {
					const res = await fetch(`${API_BASE}/api/rescan`, { method: 'POST' });
					const data = await res.json();
					if (data.success) {
						alert(data.message);
						loadSongs(); // Reload list
					} else {
						alert('Lỗi: ' + data.error);
					}
				} catch (err) {
					alert('Lỗi kết nối: ' + err.message);
				} finally {
					btn.textContent = originalText;
					btn.disabled = false;
				}
			}

			// ========== PLAYER LOGIC ==========
			const songsToPlay = () => (filteredSongs.length > 0 ? filteredSongs : allSongs);

			function playSelectedSong(index) {
				// Nếu ở chế độ phân trang thì index là relative, cần map lại nếu muốn playlist đúng
				// Hiện tại playlist sẽ play theo LIST ĐANG HIỂN THỊ
				currentSongIndex = index;
				loadAndPlaySong();
			}

			function loadAndPlaySong() {
				const playlist = songsToPlay();
				if (currentSongIndex < 0 || currentSongIndex >= playlist.length) return;

				const song = playlist[currentSongIndex];

				// Setup UI
				document.getElementById('bottomPlayer').style.display = 'flex';
				document.getElementById('bp-title').textContent = song.name;

				const cover = song.cover ? `${API_BASE}/api/thumbnail/${encodeURIComponent(song.cover)}` : `${API_BASE}/picture/default.png`;
				document.getElementById('bp-thumb').src = cover;

				// Setup Audio
				audio.src = `${API_BASE}${song.url}`;
				audio.play().catch(e => console.error("Play error:", e));
				isPlaying = true;
				updatePlayBtn();
			}

			function togglePlay() {
				if (!audio.src) return;
				if (audio.paused) {
					audio.play();
					isPlaying = true;
				} else {
					audio.pause();
					isPlaying = false;
				}
				updatePlayBtn();
			}

			function updatePlayBtn() {
				const btnImg = document.getElementById('play-icon-img');
				if (btnImg) {
					btnImg.src = isPlaying ? `${API_BASE}/api/thumbnail/pause.png` : `${API_BASE}/api/thumbnail/play.png`;
				}
			}

			function playNext() {
				const playlist = songsToPlay();
				if (isShuffle) {
					currentSongIndex = Math.floor(Math.random() * playlist.length);
				} else {
					currentSongIndex = (currentSongIndex + 1) % playlist.length;
				}
				loadAndPlaySong();
			}

			function playPrev() {
				const playlist = songsToPlay();
				currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
				loadAndPlaySong();
			}

			function toggleRepeat() {
				repeatMode = (repeatMode + 1) % 3;
				const btn = document.getElementById('btn-repeat');
				const img = document.getElementById('repeat-icon-img');

				if (repeatMode === 0) {
					btn.classList.remove('active');
					img.src = `${API_BASE}/api/thumbnail/repeat.png`;
					btn.title = "Không lặp lại";
				} else if (repeatMode === 1) {
					btn.classList.add('active');
					img.src = `${API_BASE}/api/thumbnail/repeat.png`;
					btn.title = "Lặp lại tất cả";
				} else if (repeatMode === 2) {
					btn.classList.add('active');
					img.src = `${API_BASE}/api/thumbnail/repeat-once.png`;
					btn.title = "Lặp lại một bài";
				}
			}

			function toggleShuffle() {
				isShuffle = !isShuffle;
				document.getElementById('btn-shuffle').classList.toggle('active', isShuffle);
			}

			function toggleMute() {
				audio.muted = !audio.muted;
				const btn = event.target;
				btn.textContent = audio.muted ? '🔇' : '🔊';
			}

			function setVolume() {
				audio.volume = document.getElementById('bp-volume').value;
			}

			function seekAudio() {
				const seekVal = document.getElementById('bp-seek').value;
				audio.currentTime = seekVal;
			}

			function formatTimeSimple(seconds) {
				const m = Math.floor(seconds / 60);
				const s = Math.floor(seconds % 60);
				return `${m}:${s.toString().padStart(2, '0')}`;
			}

			// Audio Events
			audio.addEventListener('timeupdate', () => {
				if (!isNaN(audio.duration)) {
					document.getElementById('bp-curr-time').textContent = formatTimeSimple(audio.currentTime);
					document.getElementById('bp-seek').value = audio.currentTime;
				}
			});

			audio.addEventListener('loadedmetadata', () => {
				document.getElementById('bp-total-time').textContent = formatTimeSimple(audio.duration);
				document.getElementById('bp-seek').max = audio.duration;
			});

			audio.addEventListener('ended', () => {
				if (repeatMode === 2) {
					// Repeat Once
					audio.currentTime = 0;
					audio.play();
				} else if (repeatMode === 1) {
					// Repeat All
					playNext();
				} else {
					// No Repeat (Stop at end of list)
					const playlist = songsToPlay();
					if (currentSongIndex < playlist.length - 1) {
						playNext();
					} else {
						isPlaying = false;
						updatePlayBtn();
					}
				}
			});

			// Load songs on page load
			loadSongs();
		</script>
	</div> <!-- End main-content -->
</body>

</html>
